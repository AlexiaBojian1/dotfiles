general {
    max_retries = 10
    hide_cursor = true
}

background {
    monitor =
    path = /home/alexia/Pictures/wallpaper-master/AutumnMounatins.jpg
    blur_passes = 3
    blur_size = 6
    brightness = 0.5
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    outer_color = rgb(32A9A6)
    inner_color = rgb(020202)
    font_color = rgb(ffffff)
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    position = 0, -100
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(255, 255, 255, 0.9)
    font_size = 64
    font_family = JetBrainsMono Nerd Font
    position = 0, 100
    halign = center
    valign = center
}
